name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest

    env:
      VITE_API_URL: http://localhost:3000

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar ESLint
        run: npm run lint

      - name: Construir frontend
        run: npm run build

  backend:
    name: Backend - Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taskmanager_db?schema=public

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias sin migraciones
        run: npm ci --ignore-scripts

      - name: Construir backend
        run: npm run build

  pruebas:
    name: Pruebas unitarias y cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas con cobertura
        run: npx vitest run --coverage

      - name: Guardar reporte de cobertura
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: reporte-cobertura
          path: coverage/
          retention-days: 15

  e2e:
    name: Pruebas E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    needs:
      - frontend
      - backend
      - pruebas

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taskmanager_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d taskmanager_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taskmanager_db?schema=public
      PORT: "3000"
      JWT_SECRET: clave-exclusiva-para-ci
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: "1234"
      E2E_USER: admin
      E2E_PASSWORD: "1234"
      VITE_API_URL: http://localhost:3000

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Instalar dependencias del frontend
        run: npm ci

      - name: Instalar dependencias del backend
        working-directory: ./backend
        run: npm ci --ignore-scripts

      - name: Construir backend
        working-directory: ./backend
        run: npm run build

      - name: Aplicar migraciones
        working-directory: ./backend
        run: npx prisma migrate deploy

      - name: Crear usuario administrador de prueba
        working-directory: ./backend
        run: node seed-admin.js

      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium

      - name: Iniciar backend y ejecutar prueba E2E
        shell: bash
        run: |
          npm --prefix backend start > backend.log 2>&1 &

          echo "Esperando que el backend responda..."

          for i in {1..30}; do
            if curl -s -o /dev/null http://localhost:3000; then
              echo "Backend listo en el puerto 3000"
              break
            fi

            if [ "$i" -eq 30 ]; then
              echo "El backend no pudo iniciar"
              cat backend.log
              exit 1
            fi

            sleep 2
          done

          npx playwright test tests/flujo-tareas.spec.ts --project=chromium

      - name: Mostrar registro del backend si falla
        if: failure()
        run: cat backend.log || true

      - name: Guardar reporte de Playwright
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 15