name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest

    env:
      VITE_API_URL: http://localhost:3000

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar ESLint
        run: npm run lint

      - name: Construir frontend
        run: npm run build

  backend:
    name: Backend - Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Verificar carga de secretos
        shell: bash
        run: |
          test -n "$DATABASE_URL" || {
            echo "DATABASE_URL no está configurado"
            exit 1
          }

          test -n "$JWT_SECRET" || {
            echo "JWT_SECRET no está configurado"
            exit 1
          }

          echo "Variables seguras cargadas correctamente"

      - name: Instalar dependencias sin ejecutar migraciones
        run: npm ci --ignore-scripts

      - name: Construir backend
        run: npm run build

  pruebas:
    name: Pruebas unitarias y cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas con cobertura
        run: npx vitest run --coverage

      - name: Guardar reporte de cobertura
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: reporte-cobertura
          path: coverage/
          retention-days: 15

  migraciones:
    name: Migraciones y seed con PostgreSQL temporal
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias sin ejecutar scripts
        run: npm ci --ignore-scripts

      - name: Generar Prisma Client
        run: npx prisma generate

      - name: Aplicar migraciones de Prisma
        run: npx prisma migrate deploy

      - name: Ejecutar seed por primera vez
        run: npx prisma db seed

      - name: Ejecutar seed por segunda vez
        run: npx prisma db seed

      - name: Verificar que el seed no duplicó datos
        shell: bash
        run: |
          node <<'NODE'
          const { PrismaClient } = require("@prisma/client");

          const prisma = new PrismaClient();
          const TASK_TITLE = "Tarea de ejemplo para pruebas";

          async function verify() {
            const count = await prisma.task.count({
              where: {
                title: TASK_TITLE,
              },
            });

            console.log(`Cantidad de tareas semilla: ${count}`);

            if (count !== 1) {
              throw new Error(
                `El seed duplicó datos. Se esperaba 1 registro y se encontraron ${count}.`
              );
            }

            console.log("Seed reproducible verificado correctamente.");
          }

          verify()
            .catch((error) => {
              console.error(error);
              process.exitCode = 1;
            })
            .finally(async () => {
              await prisma.$disconnect();
            });
          NODE

  e2e:
    name: Pruebas E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    needs:
      - frontend
      - backend
      - pruebas
      - migraciones

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taskmanager_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d taskmanager_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PORT: "3000"
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD }}
      E2E_USER: admin
      E2E_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD }}
      VITE_API_URL: http://localhost:3000

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Verificar variables seguras
        shell: bash
        run: |
          test -n "$DATABASE_URL" || {
            echo "DATABASE_URL no está configurado"
            exit 1
          }

          test -n "$JWT_SECRET" || {
            echo "JWT_SECRET no está configurado"
            exit 1
          }

          test -n "$ADMIN_PASSWORD" || {
            echo "CI_ADMIN_PASSWORD no está configurado"
            exit 1
          }

          echo "Secretos del entorno E2E cargados correctamente"

      - name: Instalar dependencias del frontend
        run: npm ci

      - name: Instalar dependencias del backend
        working-directory: ./backend
        run: npm ci --ignore-scripts

      - name: Construir backend
        working-directory: ./backend
        run: npm run build

      - name: Aplicar migraciones
        working-directory: ./backend
        run: npx prisma migrate deploy

      - name: Crear usuario administrador de prueba
        working-directory: ./backend
        run: node seed-admin.js

      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium

      - name: Iniciar backend y ejecutar prueba E2E
        shell: bash
        run: |
          npm --prefix backend start > backend.log 2>&1 &

          echo "Esperando que el backend responda..."

          for i in {1..30}; do
            if curl -s -o /dev/null http://localhost:3000/ping; then
              echo "Backend listo en el puerto 3000"
              break
            fi

            if [ "$i" -eq 30 ]; then
              echo "El backend no pudo iniciar"
              cat backend.log
              exit 1
            fi

            sleep 2
          done

          npx playwright test tests/flujo-tareas.spec.ts --project=chromium

      - name: Mostrar registro del backend si falla
        if: failure()
        run: cat backend.log || true

      - name: Guardar reporte de Playwright
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 15